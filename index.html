<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Versos Vivos | Poesía & Eventos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Componentes comunes (nav, social bar, modal) -->
  <div id="common-components"></div>

  <!-- Contenedor de páginas: cada página se añade aquí -->
  <div id="page-container"></div>

  <script>
    async function loadHTML(url, containerId, append = false) {
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const html = await response.text();
        const el = document.getElementById(containerId);
        if (append) {
          el.innerHTML += html;   // ← añade sin borrar
        } else {
          el.innerHTML = html;
        }
      } catch (error) {
        console.error(`Error cargando ${url}:`, error);
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Cargar componentes comunes
      await loadHTML('components/common.html', 'common-components');

      // 2. Cargar páginas en SECUENCIA (append = true para no sobreescribir)
      await loadHTML('pages/home.html',      'page-container', true);
      await loadHTML('pages/events.html',    'page-container', true);
      await loadHTML('pages/community.html', 'page-container', true);

      // 3. Ejecutar main.js DESPUÉS de que todo el HTML esté en el DOM
      const script = document.createElement('script');
      script.src = 'js/main.js';
      document.body.appendChild(script);
    });
  </script>
</body>
</html>
